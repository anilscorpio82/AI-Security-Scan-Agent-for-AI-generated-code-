version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: omni-analyzer-backend
    ports:
      - "8000:8000"
    environment:
      # Injected via local .env if present
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      # Volume mount the tests folder so the container has something local to scan
      - ./tests/vulnerable_repo:/app/tests/vulnerable_repo

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: omni-analyzer-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
